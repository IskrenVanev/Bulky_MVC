name: CI/CD - Docker Build, Test & Push to ECR

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1️ Checkout repository
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2️ Setup Docker Buildx
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 3️ Verify required secrets exist (fail fast)
    - name: Verify secrets
      run: |
        test -n "$CONNECTIONSTRINGS__DEFAULTCONNECTION"
      env:
        CONNECTIONSTRINGS__DEFAULTCONNECTION: ${{ secrets.CONNECTIONSTRINGS__DEFAULTCONNECTION }}

    # 3.1 Create .env file for docker compose
    - name: Create .env for CI
      run: |
        cat > .env <<EOF
        ConnectionStrings__DefaultConnection=${CONNECTIONSTRINGS__DEFAULTCONNECTION}
        AUTH_FACEBOOK_APP_ID=${AUTH_FACEBOOK_APP_ID}
        AUTH_FACEBOOK_APP_SECRET=${AUTH_FACEBOOK_APP_SECRET}
        AUTH_MICROSOFT_CLIENT_ID=${AUTH_MICROSOFT_CLIENT_ID}
        AUTH_MICROSOFT_CLIENT_SECRET=${AUTH_MICROSOFT_CLIENT_SECRET}
        Stripe__PublishableKey=${STRIPE_PUBLISHABLE_KEY}
        Stripe__SecretKey=${STRIPE_SECRET_KEY}
        EOF
      env:
        CONNECTIONSTRINGS__DEFAULTCONNECTION: ${{ secrets.CONNECTIONSTRINGS__DEFAULTCONNECTION }}
        AUTH_FACEBOOK_APP_ID: ${{ secrets.AUTH_FACEBOOK_APP_ID }}
        AUTH_FACEBOOK_APP_SECRET: ${{ secrets.AUTH_FACEBOOK_APP_SECRET }}
        AUTH_MICROSOFT_CLIENT_ID: ${{ secrets.AUTH_MICROSOFT_CLIENT_ID }}
        AUTH_MICROSOFT_CLIENT_SECRET: ${{ secrets.AUTH_MICROSOFT_CLIENT_SECRET }}
        STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
        STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}

    # 4️ Build Docker images
    - name: Build Docker images
      run: docker compose -f docker-compose.yml build

    # 5️ Start containers
    - name: Start containers
      run: docker compose -f docker-compose.yml up -d

    # 6️ Wait for app to boot
    - name: Wait for app startup
      run: sleep 40

    # 7️ Health check
    - name: Health check
      run: curl --fail http://localhost:32768/health

    # 8️ Show container logs on failure (debugging)
    - name: Show logs if failed
      if: failure()
      run: docker compose -f docker-compose.yml logs

    # 9️ Shut down containers
    - name: Stop containers
      if: always()
      run: docker compose -f docker-compose.yml down
    
    # 10 Configure AWS credentials
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    # 11 Login to Amazon ECR
    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2

    # 1️2 Tag Docker image
    - name: Tag Docker image
      run: |
        docker tag bulkybookweb:latest \
        ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:latest

    # 1️3 Push image to Amazon ECR
    - name: Push Docker image to ECR
      run: |
        docker push \
        ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:latest

